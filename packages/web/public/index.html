<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InkOS Studio 写作工作台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero card">
        <div>
          <p class="eyebrow">InkOS Studio</p>
          <h1>把命令行写作流程变成中文创作工作台</h1>
          <p class="hero-copy">
            这个工作台直接读取 InkOS 的命令结构，在本地执行真实 CLI，并把审阅、修订、写作和章节编辑放到同一张网页里。
          </p>
        </div>
        <div class="hero-grid">
          <div class="hero-chip">
            <span>packages/core</span>
            <strong>引擎、状态与章节存储</strong>
          </div>
          <div class="hero-chip">
            <span>packages/cli</span>
            <strong>命令、代理与写作流程</strong>
          </div>
          <div class="hero-chip accent">
            <span>packages/web</span>
            <strong>中文命令中心与审阅编辑层</strong>
          </div>
        </div>
      </header>

      <section class="toolbar card">
        <div>
          <label for="context-select">项目上下文</label>
          <select id="context-select"></select>
        </div>
        <div class="toolbar-note" id="cli-status"></div>
      </section>

      <section class="dashboard-grid" id="dashboard-cards"></section>

      <main class="main-grid">
        <aside class="sidebar card">
          <div class="sidebar-head">
            <div>
              <p class="eyebrow">Command Center</p>
              <h2>中文命令中心</h2>
            </div>
            <input id="command-search" type="search" placeholder="搜索中文命令、英文 path 或说明" />
          </div>
          <div id="command-groups" class="command-groups"></div>
        </aside>

        <section class="workspace-column">
          <section class="command-panel card" id="command-panel"></section>
          <section class="workbench-grid">
            <div class="stack-column">
              <section class="card" id="books-panel"></section>
              <section class="card" id="chapters-panel"></section>
              <section class="card" id="reviews-panel"></section>
            </div>
            <section class="card editor-panel" id="editor-panel"></section>
          </section>
          <section class="output-panel card" id="output-panel"></section>
        </section>
      </main>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
  </html>
